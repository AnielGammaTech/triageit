<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- SecureIT: the owner says the previous shield mark isn't their real
       logo. Placeholder rebuilt into the shared GTools tile family (same
       idea as accountit.svg) until the real one lands: dark ink
       rounded square tile (#0B0F14, matches the product's actual
       monochrome ink branding), bold white "S", small slate accent dot
       (the site's own color secureit token elsewhere on this page is that
       same slate, chosen so glows and dots stay visible against SecureIT's
       monochrome ink brand). Swappable: replace this file's fill and text
       with the real mark whenever it's supplied; tool logo.tsx renders
       every slug identically, so no other file needs to change. Note for
       future edits: XML comments may never contain a literal double
       hyphen, so avoid writing CSS custom property names like the one
       above verbatim in here. -->
  <rect width="32" height="32" rx="7" fill="#0B0F14"/>
  <circle cx="26" cy="6" r="8" fill="#94A3B8" opacity="0.10"/>
  <text x="14.5" y="20"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="18"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-0.5">S</text>
  <circle cx="22.5" cy="11" r="2.2" fill="#94A3B8"/>
</svg>
