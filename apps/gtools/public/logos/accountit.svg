<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- AccountIT is a standalone-branded CRM app (own top bar/logo, links out to QuoteIT — not a QuoteIT module).
       Mark matches the deployed app: dark navy rounded-square tile, bold white "A", small indigo accent dot. -->
  <rect width="32" height="32" rx="7" fill="#1E2532"/>
  <!-- Subtle corner glow -->
  <circle cx="26" cy="6" r="8" fill="#818CF8" opacity="0.08"/>
  <!-- A letter -->
  <text x="14.5" y="20"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="18"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-0.5">A</text>
  <!-- Indigo accent dot -->
  <circle cx="22.5" cy="11" r="2.2" fill="#A5B4FC"/>
</svg>
