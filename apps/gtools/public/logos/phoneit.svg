<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- PhoneIT — rebuilt into the shared GTools tile family (same idea as
       accountit.svg): colored rounded-square tile using the product's real
       accent (#1f6feb), bold white "P" (plain letter, not a phone glyph —
       matches the rest of the family), small accent dot top-right. -->
  <rect width="32" height="32" rx="7" fill="#1f6feb"/>
  <circle cx="26" cy="6" r="8" fill="#BFDBFE" opacity="0.08"/>
  <text x="14.5" y="20"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="18"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-0.5">P</text>
  <circle cx="22.5" cy="11" r="2.2" fill="#BFDBFE"/>
</svg>
